<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Barter Ledger</title>
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&display=swap" rel="stylesheet">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
  body { 
    background-color: #09090e; color: #e0e0f0; font-family: system-ui, -apple-system, sans-serif; 
    margin: 0; padding: 110px 20px 20px 20px; /* Clears the fixed header */
    touch-action: manipulation;
  }
  
  /* STICKY HEADER */
  h1 { 
    font-family: 'Cinzel', serif; font-size: 1.6rem; text-align: center; color: #ffffff; font-weight: 700; 
    letter-spacing: 2px; border-bottom: 1px solid #2d244a; padding: 25px 0; 
    text-shadow: 0 0 12px rgba(188, 19, 254, 0.6); text-transform: uppercase;
    position: fixed; top: 0; left: 0; width: 100%; background-color: rgba(9, 9, 14, 0.95);
    z-index: 1000; margin: 0; box-shadow: 0 5px 15px rgba(0, 0, 0, 0.8);
    backdrop-filter: blur(10px); /* Makes the header look premium */
  }

  h2 { color: #bba2ff; font-weight: 400; font-size: 1.2rem; margin-top: 30px; border-bottom: 1px dashed #2d244a; padding-bottom: 5px; }
  
  .card { 
    background: #11111a; padding: 15px; border-radius: 8px; margin-bottom: 15px; 
    border: 1px solid #2a2244; position: relative; box-shadow: 0 0 20px rgba(138, 43, 226, 0.05);
  }
  
  .flex-between { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .balance-display { font-size: 1.5rem; font-weight: bold; color: #fff; min-width: 30px; text-align: center; }
  
  .btn { 
    background: #1a1a2e; color: #fff; border: 1px solid #444; padding: 12px 15px; 
    border-radius: 6px; cursor: pointer; font-size: 0.9rem; font-weight: bold;
    flex: 1; margin: 0 5px; transition: all 0.2s ease; text-align: center;
  }
  
  .btn-green { background: rgba(0, 136, 255, 0.1); border-color: #0088ff; color: #80c4ff; }
  .btn-red { background: rgba(255, 0, 128, 0.1); border-color: #ff0080; color: #ff80c0; }
  .btn-scrap { background: transparent; border: 1px solid rgba(255, 0, 128, 0.5); color: #ff80c0; padding: 4px 10px; border-radius: 4px; font-size: 0.8rem; }

  .progress-bar { background: #09090e; border-radius: 4px; height: 12px; width: 100%; margin: 15px 0; overflow: hidden; border: 1px solid #2d244a; }
  .progress-fill { background: linear-gradient(90deg, #0088ff, #ff0080); height: 100%; width: 0%; transition: width 0.4s ease; }
  
  .input-group { display: flex; gap: 10px; margin-bottom: 10px; }
  input { background: #09090e; border: 1px solid #2d244a; color: #e0e0f0; padding: 12px; border-radius: 6px; width: 100%; font-size: 1rem; box-sizing: border-box; }

  .checkbox-wrapper { display: flex; align-items: center; cursor: pointer; gap: 10px; color: #bba2ff; font-size: 0.9rem; margin-bottom: 15px; }
  .checkbox-wrapper input { width: 22px; height: 22px; flex-shrink: 0; accent-color: #0088ff; }

  .drawer-btn { background: #11111a; border: 1px solid #2d244a; color: #bba2ff; width: 100%; margin: 0 0 10px 0; padding: 14px; border-radius: 6px; font-weight: bold; text-align: left; cursor: pointer; }

  /* THE FIXED OVERLAY PANEL */
  #settings-panel { 
    display: none; 
    position: fixed; 
    top: 50%; left: 50%; transform: translate(-50%, -50%); /* Centers perfectly */
    width: 90%; 
    max-width: 450px;
    max-height: 85vh; 
    overflow-y: auto; 
    background: #11111a; 
    z-index: 5000; /* Extremely high to beat any other element */
    border: 1px solid #0088ff; 
    border-radius: 12px; 
    padding: 25px;
    box-shadow: 0 0 50px rgba(0,0,0,1), 0 0 20px rgba(0, 136, 255, 0.3);
    box-sizing: border-box;
  }

  /* Overlay Background Blur */
  #panel-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 4999;
  }

  .user-profile { display: flex; align-items: center; gap: 12px; margin-top: 25px; padding-top: 20px; border-top: 1px solid #2d244a; color: #888; font-size: 0.85rem; }
  .user-avatar { width: 32px; height: 32px; border-radius: 50%; border: 1px solid #0088ff; }

  #app-screen { display: none; }
  #auth-screen { display: block; max-width: 400px; margin: 60px auto; }
</style>
</head>
<body>

  <h1>The Barter Ledger</h1>
  <div id="panel-overlay" onclick="closeSettings()"></div>

  <div id="auth-screen" class="card">
    <h2 style="text-align: center; margin-top: 0; border: none;">Access The Vault</h2>
    <p style="text-align: center; color: #bba2ff; font-size: 0.9rem; margin-bottom: 20px;">Identity verification required.</p>
    <button class="btn btn-google" onclick="handleGoogleLogin()">Authenticate with Google</button>
    <div id="auth-error" style="color: #ff0080; text-align: center; margin-top: 15px; font-size: 0.85rem; height: 20px;"></div>
  </div>

  <div id="app-screen">
    <div id="settings-panel">
      <h2 style="margin-top: 0; color: #0088ff; border-bottom: 2px solid #0088ff; padding-bottom: 10px;">Master Breaker Panel</h2>
      
      <button class="drawer-btn" onclick="toggleDrawer('goal-drawer')">+ Forge New Goal</button>
      <div id="goal-drawer" style="display: none; padding: 10px 0 15px 10px; border-left: 2px solid #0088ff; margin-bottom: 10px;">
        <div class="input-group"><input type="text" id="new-goal-name" placeholder="Goal Name"></div>
        <div class="input-group">
          <input type="number" id="new-goal-target" placeholder="Target" style="width: 50%;">
          <input type="number" id="new-goal-reward" placeholder="Reward" style="width: 50%;">
        </div>
        <label class="checkbox-wrapper">
            <input type="checkbox" id="new-goal-is-currency" checked> <span>Use Currency ($)</span>
        </label>
        <button class="btn btn-green" style="width: 100%; margin: 0;" onclick="createGoal()">Construct Goal</button>
      </div>

      <button class="drawer-btn" onclick="toggleDrawer('contract-drawer')">+ Forge New Contract</button>
      <div id="contract-drawer" style="display: none; padding: 10px 0 15px 10px; border-left: 2px solid #ff0080; margin-bottom: 10px;">
        <div class="input-group">
          <input type="text" id="new-task" placeholder="The Chore">
          <input type="text" id="new-reward" placeholder="The Reward">
        </div>
        <div class="input-group">
          <input type="number" id="new-earn" placeholder="Earn amt" style="width: 50%;">
          <input type="number" id="new-cost" placeholder="Claim cost" style="width: 50%;">
        </div>
        <button class="btn btn-green" style="width: 100%; margin: 0;" onclick="createContract()">Lock It In</button>
      </div>

      <button class="drawer-btn" style="color: #ff0080; border-color: rgba(255, 0, 128, 0.3);" onclick="toggleDrawer('nuke-drawer')">⚠ Danger Zone</button>
      <div id="nuke-drawer" style="display: none; padding: 10px 0 15px 10px; border-left: 2px solid #ff0080; margin-bottom: 10px;">
        <button class="btn btn-red" style="width: 100%; margin: 0; background: rgba(255, 0, 0, 0.2);" onclick="resetToOEM()">Nuclear Option: Reset to OEM</button>
      </div>

      <button class="drawer-btn" style="color: #0088ff; border-color: rgba(0, 136, 255, 0.3);" onclick="toggleDrawer('install-drawer')">📲 Install App</button>
      <div id="install-drawer" style="display: none; padding: 10px; border-left: 2px solid #0088ff; margin-bottom: 10px; font-size: 0.85rem; color: #bba2ff;">
        <p><strong>iOS/Safari:</strong> Tap <strong>Share</strong> and <strong>Add to Home Screen</strong>.</p>
        <p><strong>Android:</strong> Tap <strong>(⋮)</strong> and <strong>Install app</strong>.</p>
      </div>

      <div class="user-profile">
        <img id="user-img" class="user-avatar" src="" alt="" style="display: none;">
        <span id="user-info">Sync Active</span>
      </div>

      <button class="btn btn-red" style="width: 100%; margin: 20px 0 0 0; padding: 15px;" onclick="closeSettings()">Close Panel</button>
    </div>

    <div id="savings-wrapper"><h2>Active Goals</h2><div id="savings-container"></div></div>
    <h2>Active Contracts</h2><div id="contracts-container"></div>

    <div class="flex-between" style="margin-top: 30px;">
      <button class="btn" style="background: transparent; border-color: #0088ff; color: #0088ff;" onclick="openSettings()">Configure Dashboard</button>
      <button class="btn btn-red" style="background: transparent; border-color: #ff0080;" onclick="handleLogout()">Log Out</button>
    </div>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCLuXhHumIHLHLhGqJl8NDh5VD-TmUO8fM",
    authDomain: "barter-ledger-cloud.firebaseapp.com",
    projectId: "barter-ledger-cloud",
    storageBucket: "barter-ledger-cloud.firebasestorage.app",
    messagingSenderId: "836849138330",
    appId: "1:836849138330:web:aa937f2728aa0b678abd23",
    measurementId: "G-6J6H37DCB8"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const googleProvider = new GoogleAuthProvider();

  let currentUser = null;
  let contracts = [];
  let savingsGoals = [];
  const defaultContracts = [{ id: 'c1', task: 'Walk a mile', reward: 'Have a snack', balance: 0, earnRate: 1, costRate: 1 }];
  const defaultGoals = [{ id: 'g1', name: "Personal Budget", current: 0, target: 100, reward: 50, isCurrency: true }];

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      currentUser = user;
      updateUserDisplay(user);
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('app-screen').style.display = 'block';
      await loadCloudData();
    } else {
      currentUser = null;
      document.getElementById('auth-screen').style.display = 'block';
      document.getElementById('app-screen').style.display = 'none';
    }
  });

  function updateUserDisplay(user) {
    const info = document.getElementById('user-info');
    const img = document.getElementById('user-img');
    info.innerText = `Vault: ${user.email || user.displayName}`;
    if (user.photoURL) { img.src = user.photoURL; img.style.display = 'block'; }
  }

  window.handleGoogleLogin = () => { signInWithPopup(auth, googleProvider); };
  window.handleLogout = () => { signOut(auth); };

  async function loadCloudData() {
    if (!currentUser) return;
    const docRef = doc(db, "ledgers", currentUser.uid);
    const docSnap = await getDoc(docRef);
    if (docSnap.exists()) {
      let data = docSnap.data();
      contracts = data.contracts || defaultContracts;
      savingsGoals = data.savingsGoals || defaultGoals;
    } else {
      contracts = defaultContracts; savingsGoals = defaultGoals; saveToCloud(); 
    }
    renderGoals(); renderContracts();
  }

  function saveToCloud() {
    if (!currentUser) return;
    setDoc(doc(db, "ledgers", currentUser.uid), { contracts, savingsGoals });
  }

  window.openSettings = () => { 
    document.getElementById('settings-panel').style.display = 'block'; 
    document.getElementById('panel-overlay').style.display = 'block';
  };
  
  window.closeSettings = () => { 
    document.getElementById('settings-panel').style.display = 'none'; 
    document.getElementById('panel-overlay').style.display = 'none';
    ['goal-drawer', 'contract-drawer', 'nuke-drawer', 'install-drawer'].forEach(d => document.getElementById(d).style.display = 'none');
  };

  window.toggleDrawer = (id) => {
    const d = document.getElementById(id);
    d.style.display = d.style.display === 'none' ? 'block' : 'none';
  };

  window.resetToOEM = () => {
    if (confirm("Reset everything?")) {
      savingsGoals = JSON.parse(JSON.stringify(defaultGoals));
      contracts = JSON.parse(JSON.stringify(defaultContracts));
      renderGoals(); renderContracts(); saveToCloud(); closeSettings();
    }
  }

  function renderGoals() {
    const container = document.getElementById('savings-container');
    container.innerHTML = savingsGoals.length === 0 ? '<div style="color:#555;">No goals.</div>' : '';
    savingsGoals.forEach((goal, i) => {
      let percent = Math.min((goal.current / goal.target) * 100, 100);
      let sym = goal.isCurrency ? '$' : '';
      container.innerHTML += `<div class="card">
          <div class="flex-between"><span>${goal.name} (${sym}${goal.target})</span><button class="btn-scrap" onclick="deleteGoal(${i})">Scrap</button></div>
          <div class="flex-between"><span>${sym}${goal.current} / ${sym}${goal.target}</span><span>Reward: ${sym}${goal.reward}</span></div>
          <div class="progress-bar"><div class="progress-fill" style="width: ${percent}%;"></div></div>
          <div class="flex-between"><button class="btn btn-green" onclick="modifyGoal(${i}, 5)">+5</button><button class="btn btn-green" onclick="modifyGoal(${i}, 10)">+10</button></div>
          <div class="input-group"><input type="number" id="c-g-${i}" placeholder="Amt"><button class="btn btn-green" onclick="injectGoal(${i}, true)">Add</button></div>
          <button class="btn btn-red" style="display:${goal.current >= goal.target ? 'block' : 'none'}; width:100%;" onclick="claimGoal(${i})">Claim</button>
      </div>`;
    });
  }

  window.modifyGoal = (i, amt) => { savingsGoals[i].current += amt; renderGoals(); saveToCloud(); };
  window.injectGoal = (i, add) => { 
    let inp = document.getElementById(`c-g-${i}`); 
    let v = parseInt(inp.value); if(!isNaN(v)){ savingsGoals[i].current += add ? v : -v; inp.value=''; renderGoals(); saveToCloud(); }
  };
  window.claimGoal = (i) => { if(savingsGoals[i].current >= savingsGoals[i].target){ savingsGoals[i].current -= savingsGoals[i].target; renderGoals(); saveToCloud(); } };
  window.deleteGoal = (i) => { if(confirm("Scrap?")){ savingsGoals.splice(i, 1); renderGoals(); saveToCloud(); } };

  window.createGoal = () => {
    let name = document.getElementById('new-goal-name').value;
    let target = parseInt(document.getElementById('new-goal-target').value);
    let reward = parseInt(document.getElementById('new-goal-reward').value) || 0;
    let isCurr = document.getElementById('new-goal-is-currency').checked;
    if (name && target > 0) {
      savingsGoals.push({ id: Date.now().toString(), name, current: 0, target, reward, isCurrency: isCurr });
      document.getElementById('new-goal-name').value=''; renderGoals(); saveToCloud(); closeSettings();
    }
  }

  function renderContracts() {
    const container = document.getElementById('contracts-container');
    container.innerHTML = contracts.length === 0 ? '<div style="color:#555;">No contracts.</div>' : '';
    contracts.forEach((c, i) => {
      container.innerHTML += `<div class="card">
          <div class="flex-between"><span>${c.task} = ${c.reward}</span><button class="btn-scrap" onclick="deleteContract(${i})">Scrap</button></div>
          <div class="flex-between"><button class="btn btn-green" onclick="modifyBalance(${i}, ${c.earnRate || 1})">Task Done</button><span class="balance-display">${c.balance || 0}</span><button class="btn btn-red" onclick="modifyBalance(${i}, -${c.costRate || 1})">Claim</button></div>
        </div>`;
    });
  }

  window.modifyBalance = (i, amt) => { let b = (contracts[i].balance || 0) + amt; if(b >= 0){ contracts[i].balance = b; renderContracts(); saveToCloud(); } };
  window.deleteContract = (i) => { if(confirm("Scrap?")){ contracts.splice(i, 1); renderContracts(); saveToCloud(); } };

  window.createContract = () => {
    let t = document.getElementById('new-task').value; let r = document.getElementById('new-reward').value;
    let e = parseInt(document.getElementById('new-earn').value) || 1; let c = parseInt(document.getElementById('new-cost').value) || 1;
    if (t && r) {
      contracts.push({ id: Date.now().toString(), task: t, reward: r, balance: 0, earnRate: e, costRate: c });
      document.getElementById('new-task').value=''; document.getElementById('new-reward').value='';
      document.getElementById('new-earn').value=''; document.getElementById('new-cost').value='';
      renderContracts(); saveToCloud(); closeSettings();
    }
  }
</script>
</body>
</html>
