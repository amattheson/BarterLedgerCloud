<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Barter Ledger</title>
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&display=swap" rel="stylesheet">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
  body { 
    background-color: #09090e; color: #e0e0f0; font-family: system-ui, -apple-system, sans-serif; 
    margin: 0; padding: 20px; touch-action: manipulation;
  }
  h1 { 
    font-family: 'Cinzel', serif;
    font-size: 1.6rem;
    text-align: center;
    color: #ffffff; font-weight: 700; letter-spacing: 2px; border-bottom: 1px solid #2d244a; 
    padding-bottom: 10px; text-shadow: 0 0 12px rgba(188, 19, 254, 0.6); text-transform: uppercase;
  }
  h2 { color: #bba2ff; font-weight: 400; font-size: 1.2rem; margin-top: 30px; border-bottom: 1px dashed #2d244a; padding-bottom: 5px; text-shadow: 0 0 8px rgba(187, 162, 255, 0.3); }
  
  .card { 
    background: #11111a; padding: 15px; border-radius: 8px; margin-bottom: 15px; 
    border: 1px solid #2a2244; position: relative;
    box-shadow: 0 0 20px rgba(138, 43, 226, 0.05);
  }
  
  .flex-between { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .task-name { font-size: 1rem; color: #d5d6e2; }
  .balance-display { font-size: 1.5rem; font-weight: bold; color: #fff; min-width: 30px; text-align: center; text-shadow: 0 0 10px rgba(255, 255, 255, 0.3); }
  
  .btn { 
    background: #1a1a2e; color: #fff; border: 1px solid #444; padding: 10px 15px; 
    border-radius: 6px; cursor: pointer; font-size: 0.9rem; font-weight: bold;
    flex: 1; margin: 0 5px; transition: all 0.2s ease; text-align: center;
  }
  
  .btn-green { background: rgba(0, 136, 255, 0.1); border-color: #0088ff; color: #80c4ff; }
  .btn-green:active { background: #0088ff; color: #fff; box-shadow: 0 0 15px #0088ff; }
  
  .btn-red { background: rgba(255, 0, 128, 0.1); border-color: #ff0080; color: #ff80c0; }
  .btn-red:active { background: #ff0080; color: #fff; box-shadow: 0 0 15px #ff0080; }

  .btn-google { background: #e0e0f0; color: #09090e; border-color: #fff; margin-top: 15px; width: 100%; box-shadow: 0 0 10px rgba(255,255,255,0.2); padding: 15px; font-size: 1rem; }
  .btn-google:active { background: #fff; box-shadow: 0 0 15px #fff; }
  
  .btn-scrap {
    background: transparent; border: 1px solid rgba(255, 0, 128, 0.5); color: #ff80c0; padding: 4px 10px; 
    border-radius: 4px; font-size: 0.8rem; cursor: pointer; transition: all 0.2s ease;
  }
  .btn-scrap:hover, .btn-scrap:active { background: rgba(255, 0, 128, 0.2); box-shadow: 0 0 8px rgba(255, 0, 128, 0.6); color: #fff; }

  .progress-bar { 
    background: #09090e; border-radius: 4px; height: 12px; width: 100%; margin: 15px 0; 
    overflow: hidden; border: 1px solid #2d244a; box-shadow: inset 0 0 5px rgba(0,0,0,0.8);
  }
  .progress-fill { 
    background: linear-gradient(90deg, #0088ff, #ff0080); 
    height: 100%; width: 0%; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
    box-shadow: 0 0 12px rgba(255, 0, 128, 0.6);
  }
  
  .input-group { display: flex; gap: 10px; margin-bottom: 10px; }
  input { 
    background: #09090e; border: 1px solid #2d244a; color: #e0e0f0; padding: 10px; 
    border-radius: 6px; width: 100%; font-size: 1rem; box-sizing: border-box; transition: all 0.2s;
  }
  input:focus { outline: none; border-color: #0088ff; box-shadow: 0 0 8px rgba(0, 136, 255, 0.4); }

  .checkbox-wrapper { display: flex; align-items: center; cursor: pointer; gap: 10px; color: #bba2ff; font-size: 0.9rem; }
  .checkbox-wrapper input { width: 18px; height: 18px; cursor: pointer; accent-color: #0088ff; margin: 0; }

  .drawer-btn { background: #11111a; border: 1px solid #2d244a; color: #bba2ff; width: 100%; margin: 0 0 10px 0; padding: 12px; border-radius: 6px; font-weight: bold; text-align: left; cursor: pointer; }
  .drawer-btn:hover { background: #1a1a2e; }

  #app-screen { display: none; }
  #auth-screen { display: block; max-width: 400px; margin: 60px auto; }
  #settings-panel { display: none; }
</style>
</head>
<body>

  <h1>The Barter Ledger</h1>

  <div id="auth-screen" class="card">
    <h2 style="text-align: center; margin-top: 0; border: none;">Access The Vault</h2>
    <p style="text-align: center; color: #bba2ff; font-size: 0.9rem; margin-bottom: 20px;">Identity verification required.</p>
    <button class="btn btn-google" onclick="handleGoogleLogin()">Authenticate with Google</button>
    <div id="auth-error" style="color: #ff0080; text-align: center; margin-top: 15px; font-size: 0.85rem; height: 20px;"></div>
  </div>

  <div id="app-screen">
    
    <div id="settings-panel" class="card" style="border-color: #0088ff; box-shadow: 0 0 15px rgba(0, 136, 255, 0.2);">
      <h2 style="margin-top: 0; color: #0088ff; border-bottom-color: #0088ff;">Master Breaker Panel</h2>
      
      <label class="checkbox-wrapper" style="margin-bottom: 20px;">
        <input type="checkbox" id="toggle-savings-module" onchange="toggleModuleVisibility()">
        Power to Capital Liquidation Module
      </label>
      
      <button class="drawer-btn" onclick="toggleDrawer('goal-drawer')">+ Forge New Capital Goal</button>
      <div id="goal-drawer" style="display: none; padding: 10px 0 15px 0; border-left: 2px solid #0088ff; padding-left: 10px; margin-bottom: 10px;">
        <div class="input-group">
          <input type="text" id="new-goal-name" placeholder="Goal Name (e.g., CDL Fees)">
        </div>
        <div class="input-group">
          <input type="number" id="new-goal-target" placeholder="Target Quantity" style="width: 50%;">
          <input type="number" id="new-goal-reward" placeholder="Reward Quantity" style="width: 50%;">
        </div>
        <label class="checkbox-wrapper" style="margin-bottom: 10px;">
            <input type="checkbox" id="new-goal-is-currency" checked> Use Currency ($)
        </label>
        <button class="btn btn-green" style="width: 100%; margin: 0;" onclick="createGoal()">Construct Goal</button>
      </div>

      <button class="drawer-btn" onclick="toggleDrawer('contract-drawer')">+ Forge New Contract</button>
      <div id="contract-drawer" style="display: none; padding: 10px 0 15px 0; border-left: 2px solid #ff0080; padding-left: 10px; margin-bottom: 10px;">
        <div class="input-group">
          <input type="text" id="new-task" placeholder="The Chore (e.g., Walk a mile)">
          <input type="text" id="new-reward" placeholder="The Reward (e.g., Snack)">
        </div>
        <div class="input-group">
          <input type="number" id="new-earn" placeholder="Earn amt" value="1" style="width: 50%;">
          <input type="number" id="new-cost" placeholder="Claim cost" value="1" style="width: 50%;">
        </div>
        <button class="btn btn-green" style="width: 100%; margin: 0;" onclick="createContract()">Lock It In</button>
      </div>

      <button class="drawer-btn" style="color: #ff0080; border-color: rgba(255, 0, 128, 0.3);" onclick="toggleDrawer('nuke-drawer')">⚠ Danger Zone</button>
      <div id="nuke-drawer" style="display: none; padding: 10px 0 15px 0; border-left: 2px solid #ff0080; padding-left: 10px; margin-bottom: 10px;">
        <p style="font-size: 0.8rem; color: #ff80c0; margin-bottom: 10px;">Warning: This action is irreversible.</p>
        <button class="btn btn-red" style="width: 100%; margin: 0; background: rgba(255, 0, 0, 0.2);" onclick="resetToOEM()">Nuclear Option: Reset to OEM</button>
      </div>

      <button class="btn btn-red" style="width: 100%; margin: 20px 0 0 0;" onclick="closeSettings()">Close Panel</button>
    </div>

    <div id="savings-wrapper">
      <h2>Capital Liquidation</h2>
      <div id="savings-container"></div>
    </div>

    <h2>Active Contracts</h2>
    <div id="contracts-container"></div>

    <div class="flex-between" style="margin-top: 30px;">
      <button class="btn" style="background: transparent; border-color: #0088ff; color: #0088ff;" onclick="openSettings()">Configure Dashboard</button>
      <button class="btn btn-red" style="background: transparent; border-color: #ff0080;" onclick="handleLogout()">Log Out</button>
    </div>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCLuXhHumIHLHLhGqJl8NDh5VD-TmUO8fM",
    authDomain: "barter-ledger-cloud.firebaseapp.com",
    projectId: "barter-ledger-cloud",
    storageBucket: "barter-ledger-cloud.firebasestorage.app",
    messagingSenderId: "836849138330",
    appId: "1:836849138330:web:aa937f2728aa0b678abd23",
    measurementId: "G-6J6H37DCB8"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const googleProvider = new GoogleAuthProvider();

  let currentUser = null;
  let showSavingsModule = true; 
  
  // Factory Defaults
  let defaultContracts = [
    { id: 'c1', task: 'Walk a mile', reward: 'Have a snack', balance: 0, earnRate: 1, costRate: 1 },
    { id: 'c2', task: 'Study for 1 hour', reward: 'YouTube for 10 min', balance: 0, earnRate: 1, costRate: 1 }
  ];
  let contracts = [];

  let defaultGoals = [
    { id: 'g1', name: "Family Saving's", current: 0, target: 100, reward: 50, isCurrency: true }
  ];
  let savingsGoals = [];

  // --- Authentication ---
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      currentUser = user;
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('app-screen').style.display = 'block';
      await loadCloudData();
    } else {
      currentUser = null;
      document.getElementById('auth-screen').style.display = 'block';
      document.getElementById('app-screen').style.display = 'none';
    }
  });

  window.handleGoogleLogin = () => {
    signInWithPopup(auth, googleProvider).catch(error => {
      document.getElementById('auth-error').innerText = "Access Denied: " + error.message;
    });
  };

  window.handleLogout = () => { signOut(auth); };

  // --- Cloud Sync ---
  async function loadCloudData() {
    if (!currentUser) return;
    const docRef = doc(db, "ledgers", currentUser.uid);
    const docSnap = await getDoc(docRef);
    
    if (docSnap.exists()) {
      let data = docSnap.data();
      contracts = data.contracts || defaultContracts;
      savingsGoals = data.savingsGoals || defaultGoals;
      showSavingsModule = data.showSavingsModule !== false; 
    } else {
      contracts = defaultContracts;
      savingsGoals = defaultGoals;
      saveToCloud(); 
    }
    
    applySettingsToUI();
    renderGoals();
    renderContracts();
  }

  function saveToCloud() {
    if (!currentUser) return;
    const docRef = doc(db, "ledgers", currentUser.uid);
    setDoc(docRef, {
      contracts: contracts,
      savingsGoals: savingsGoals,
      showSavingsModule: showSavingsModule
    });
  }

  // --- Settings Panel Logic ---
  window.openSettings = () => { 
    document.getElementById('settings-panel').style.display = 'block'; 
  };
  
  window.closeSettings = () => { 
    document.getElementById('settings-panel').style.display = 'none'; 
    document.getElementById('goal-drawer').style.display = 'none';
    document.getElementById('contract-drawer').style.display = 'none';
    document.getElementById('nuke-drawer').style.display = 'none';
  };

  window.toggleDrawer = (drawerId) => {
    const drawer = document.getElementById(drawerId);
    drawer.style.display = drawer.style.display === 'none' ? 'block' : 'none';
  };

  window.toggleModuleVisibility = () => {
    showSavingsModule = document.getElementById('toggle-savings-module').checked;
    applySettingsToUI();
    saveToCloud();
  }

  function applySettingsToUI() {
    document.getElementById('toggle-savings-module').checked = showSavingsModule;
    document.getElementById('savings-wrapper').style.display = showSavingsModule ? 'block' : 'none';
  }

  window.resetToOEM = () => {
    if (confirm("CRITICAL WARNING: This will completely obliterate BOTH your current savings goals AND your active contracts, resetting the entire board. Do you wish to proceed?")) {
      showSavingsModule = true; // FORCE POWER ON FOR RESET
      savingsGoals = JSON.parse(JSON.stringify(defaultGoals));
      savingsGoals.forEach(g => g.id = Date.now().toString() + Math.floor(Math.random() * 1000));
      
      contracts = JSON.parse(JSON.stringify(defaultContracts));
      contracts.forEach(c => c.id = Date.now().toString() + Math.floor(Math.random() * 1000));
      
      applySettingsToUI();
      renderGoals();
      renderContracts();
      saveToCloud();
      closeSettings();
    }
  }

  // --- Dynamic Financial Mechanics ---
  function renderGoals() {
    const container = document.getElementById('savings-container');
    container.innerHTML = '';

    if (savingsGoals.length === 0) {
        container.innerHTML = '<div style="color: #555; font-size: 0.9rem; font-style: italic;">No active goals. Forge a new one in the dashboard settings.</div>';
        return;
    }

    savingsGoals.forEach((goal, index) => {
      let percent = Math.min((Math.max(goal.current, 0) / goal.target) * 100, 100);
      let claimDisplay = goal.current >= goal.target ? 'block' : 'none';
      
      // Handle unit symbol
      let sym = goal.isCurrency ? '$' : '';
      let rewardText = goal.isCurrency ? `$${goal.reward}` : `${goal.reward} units`;

      container.innerHTML += `
        <div class="card">
          <div class="flex-between" style="border-bottom: 1px solid #2d244a; padding-bottom: 8px; margin-bottom: 12px;">
            <span class="task-name" style="color: #bba2ff;">${goal.name} (Goal: ${sym}${goal.target})</span>
            <button class="btn-scrap" onclick="deleteGoal(${index})">Scrap</button>
          </div>
          
          <div class="flex-between" style="margin-top: 10px;">
            <span style="color: #7ab4ff; font-weight: bold; text-shadow: 0 0 5px rgba(0, 136, 255, 0.4);">${sym}<span>${goal.current}</span> <span style="color: #555;">/ ${sym}<span>${goal.target}</span></span></span>
            <span style="color: #ff80c0; font-size: 0.85rem;">Reward: ${rewardText}</span>
          </div>

          <div class="progress-bar">
            <div class="progress-fill" style="width: ${percent}%;"></div>
          </div>
          
          <div class="flex-between" style="margin: 0 -5px;">
            <button class="btn btn-green" onclick="modifyGoal(${index}, 5)">+5</button>
            <button class="btn btn-green" onclick="modifyGoal(${index}, 10)">+10</button>
            <button class="btn btn-green" onclick="modifyGoal(${index}, 20)">+20</button>
          </div>
          
          <div class="input-group" style="margin-top: 10px;">
            <input type="number" id="custom-goal-${index}" placeholder="Custom Amount">
            <button class="btn btn-green" style="margin: 0; flex: 0.5;" onclick="injectGoal(${index}, true)">Add</button>
            <button class="btn btn-red" style="margin: 0; flex: 0.5;" onclick="injectGoal(${index}, false)">Remove</button>
          </div>
          
          <button class="btn btn-red" style="display:${claimDisplay}; width: 100%; margin: 15px 0 0 0;" onclick="claimGoal(${index})">Claim ${rewardText} & Reset</button>
        </div>
      `;
    });
  }

  window.modifyGoal = (index, amount) => {
    savingsGoals[index].current += amount;
    renderGoals();
    saveToCloud();
  }

  window.injectGoal = (index, isAdding) => {
    let inputField = document.getElementById(`custom-goal-${index}`);
    let amount = parseInt(inputField.value);
    if (!isNaN(amount) && amount > 0) {
      let finalAmount = isAdding ? amount : -amount;
      savingsGoals[index].current += finalAmount;
      inputField.value = '';
      renderGoals();
      saveToCloud();
    }
  }

  window.claimGoal = (index) => {
    if (savingsGoals[index].current >= savingsGoals[index].target) {
      savingsGoals[index].current -= savingsGoals[index].target;
      renderGoals();
      saveToCloud();
    }
  }

  window.deleteGoal = (index) => {
    if (confirm("Are you sure you want to scrap this goal?")) {
      savingsGoals.splice(index, 1);
      renderGoals();
      saveToCloud();
    }
  }

  window.createGoal = () => {
    let name = document.getElementById('new-goal-name').value;
    let target = parseInt(document.getElementById('new-goal-target').value);
    let reward = parseInt(document.getElementById('new-goal-reward').value);
    let isCurrency = document.getElementById('new-goal-is-currency').checked;

    if (name && !isNaN(target) && target > 0) {
      let finalReward = isNaN(reward) ? 0 : reward;
      savingsGoals.push({ 
        id: Date.now().toString(), 
        name: name, 
        current: 0, 
        target: target, 
        reward: finalReward,
        isCurrency: isCurrency 
      });
      
      document.getElementById('new-goal-name').value = '';
      document.getElementById('new-goal-target').value = '';
      document.getElementById('new-goal-reward').value = '';
      
      renderGoals();
      saveToCloud();
      closeSettings();
    }
  }

  // --- Barter Mechanics ---
  function renderContracts() {
    const container = document.getElementById('contracts-container');
    container.innerHTML = '';

    if (contracts.length === 0) {
        container.innerHTML = '<div style="color: #555; font-size: 0.9rem; font-style: italic;">No active contracts. Forge a new one in the dashboard settings.</div>';
        return;
    }

    contracts.forEach((contract, index) => {
      let earn = contract.earnRate || 1;
      let cost = contract.costRate || 1;
      let bal = contract.balance || 0;
      let taskName = contract.task || "Unknown Task";
      let rewardName = contract.reward || "Reward";

      container.innerHTML += `
        <div class="card">
          <div class="flex-between" style="border-bottom: 1px solid #2d244a; padding-bottom: 8px; margin-bottom: 12px;">
            <span style="color: #bba2ff; font-size: 0.9rem;">${taskName} <span style="color: #555;">=</span> ${rewardName}</span>
            <button class="btn-scrap" onclick="deleteContract(${index})">Scrap</button>
          </div>
          <div class="flex-between">
            <button class="btn btn-green" onclick="modifyBalance(${index}, ${earn})">Completed Task</button>
            <span class="balance-display">${bal}</span>
            <button class="btn btn-red" onclick="modifyBalance(${index}, -${cost})">Claim Reward</button>
          </div>
          <div style="text-align: center; margin-top: 8px; color: #7ab4ff; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px;">
            INVENTORY: ${rewardName}
          </div>
        </div>
      `;
    });
  }

  window.modifyBalance = (index, amount) => {
    let currentBal = contracts[index].balance || 0;
    if (currentBal + amount >= 0) {
      contracts[index].balance = currentBal + amount;
      renderContracts();
      saveToCloud();
    }
  }

  window.deleteContract = (index) => {
    if (confirm("Are you sure you want to scrap this contract permanently?")) {
      contracts.splice(index, 1);
      renderContracts();
      saveToCloud();
    }
  }

  window.createContract = () => {
    let task = document.getElementById('new-task').value;
    let reward = document.getElementById('new-reward').value;
    let earn = parseInt(document.getElementById('new-earn').value) || 1;
    let cost = parseInt(document.getElementById('new-cost').value) || 1;

    if (task && reward) {
      contracts.push({ id: Date.now().toString(), task: task, reward: reward, balance: 0, earnRate: earn, costRate: cost });
      document.getElementById('new-task').value = '';
      document.getElementById('new-reward').value = '';
      document.getElementById('new-earn').value = '1';
      document.getElementById('new-cost').value = '1';
      renderContracts();
      saveToCloud();
      closeSettings();
    }
  }
</script>
</body>
</html>
